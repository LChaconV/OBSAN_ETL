produc_gas_transform:
  source:
    bronze_dir: "data/bronze/produc_gas"
    silver_fact_dir: "data/silver/produc_gas"
    golden_fact_dir: "data/golden/produc_gas"
  run:
    process_latest_run_only: true

  validation:
    required_columns:
      - ":id"
      - ":updated_at"
      - "vigencia"
      - "mes"
      - "produccionkpc"
      - "geolocalizacion"
      - "latitud"
      - "longitud"
  date_parsing:
    source_column: 
    raw_column: 
    parsed_column: 
    invalid_flag_column: 
    formats:
      - "%d/%m/%Y"
      - "%Y/%m/%d"
      - "%d/%m/%y"
      - "%d/%m/%Y %H:%M"

  typing:
    numeric_columns:
      - "vigencia"
      - "mes"
      - "produccionkpc"
    text_columns:
      - "latitud"
      - "longitud"
      
    datetime_columns:
      - ":updated_at"
  

  deduplication:
    id_column: ":id"
    order_column: ":updated_at"
    keep: "last"

  fact_table:
    grain:
      - "vigencia"
      - "mes"
      - "latitud"
      - "longitud"
    metric_column: "produccionkpc"
    rename_columns:
      mes: "month"
      vigencia: "year"
      produccionkpc: "produc_kpc"

    file_prefix: "produc_gas"