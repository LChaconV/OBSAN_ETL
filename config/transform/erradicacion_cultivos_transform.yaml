erradicacion_cultivos_transform:
  source:
    bronze_dir: "data/bronze/erradicacion_cultivos"
    silver_fact_dir: "data/silver/erradicacion_cultivos"
    golden_fact_dir: "data/golden/erradicacion_cultivos"
  run:
    process_latest_run_only: true

  validation:
    required_columns:
      - ":id"
      - ":updated_at"
      - "fecha_hecho"
      - "cod_depto"
      - "cod_muni"
      - "tipo_de_cultivo"
      - "cantidad"
      - "unidad"
  date_parsing:
    source_column: "fecha_hecho"
    raw_column: "fecha_corte_raw"
    parsed_column: "date_event"
    invalid_flag_column: "invalid_date"
    formats:
      - "%d/%m/%Y"
      - "%Y/%m/%d"
      - "%d/%m/%y"
      - "%d/%m/%Y %H:%M"

  typing:
    numeric_columns:
      - "cantidad"
    text_columns:
      - "cod_depto"
      - "cod_muni"
      - "tipo_de_cultivo"
      - "unidad"
    datetime_columns:
      - ":updated_at"
      - "fecha_hecho"

  deduplication:
    id_column: ":id"
    order_column: ":updated_at"
    keep: "last"

  fact_table:
    grain:
      - "fecha_hecho"
      - "cod_depto"
      - "cod_muni"
      - "tipo_de_cultivo"
    metric_column: "cantidad"
    rename_columns:
      fecha_hecho: "date_event"
      cod_depto: "id_dept"
      cod_muni: "id_mun"
      tipo_de_cultivo: "id_illicit_crop"
      cantidad: "quantity"
      unidad: "unit"  
    output_columns:
   
      - "date_event"
      - "id_dept"
      - "id_mun"
      - "quantity"
    file_prefix: "erradicacion_cultivos"